name: Philosopher Pipeline

on:
  schedule:
    - cron: "30 3 * * 2"  # Tue 9am IST
    - cron: "30 6 * * 2"  # Tue 12pm IST
    - cron: "30 5 * * 3"  # Wed 11am IST
    - cron: "30 13 * * 3" # Wed 7pm IST
    - cron: "30 6 * * 4"  # Thu 12pm IST
    - cron: "30 13 * * 4" # Thu 7pm IST
    - cron: "30 3 * * 5"  # Fri 9am IST
    - cron: "30 6 * * 5"  # Fri 12pm IST
    - cron: "30 4 * * 6"  # Sat 10am IST
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore audio cache
        uses: actions/cache@v4
        with:
          path: cache/audio
          key: audio-${{ runner.os }}-${{ hashFiles('songs.md') }}
          restore-keys: audio-${{ runner.os }}-

      - name: Seed audio cache from release
        run: |
          mkdir -p cache/audio
          if [ "$(ls cache/audio/*.m4a 2>/dev/null | wc -l)" -lt "18" ]; then
            echo "Audio cache sparse — seeding from release..."
            gh release download audio-cache-v1 --pattern "audio-cache.zip" --output /tmp/audio-cache.zip
            unzip -o /tmp/audio-cache.zip -d cache/audio
            echo "Seeded $(ls cache/audio/*.m4a | wc -l) files"
          else
            echo "Audio cache already populated ($(ls cache/audio/*.m4a | wc -l) files)"
          fi
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore photo cache
        uses: actions/cache@v4
        with:
          path: cache/photos
          key: photo-${{ runner.os }}
          restore-keys: photo-${{ runner.os }}-

      - name: Restore paintings cache
        uses: actions/cache@v4
        with:
          path: cache/paintings
          key: paintings-${{ runner.os }}
          restore-keys: paintings-${{ runner.os }}-

      - name: Restore Instagram session
        run: |
          if [ -n "${{ secrets.INSTAGRAM_SESSION }}" ]; then
            echo "${{ secrets.INSTAGRAM_SESSION }}" | base64 -d \
              > "${{ secrets.INSTAGRAM_USERNAME }}.session"
            echo "Session restored."
          else
            echo "No session secret — fresh login will occur."
          fi
        continue-on-error: true

      - name: Download fonts
        run: |
          mkdir -p fonts
          curl -fsSL \
            "https://github.com/google/fonts/raw/main/ofl/playfairdisplay/PlayfairDisplay%5Bwght%5D.ttf" \
            -o fonts/PlayfairDisplay-Regular.ttf
          curl -fsSL \
            "https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf" \
            -o fonts/Inter-Regular.ttf
          curl -fsSL \
            "https://github.com/google/fonts/raw/main/ofl/unifrakturmaguntia/UnifrakturMaguntia-Book.ttf" \
            -o fonts/UnifrakturMaguntia-Book.ttf || \
            echo "gothic font download failed — composer will fall back to Playfair"

      - name: Write YouTube cookies
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 -d > cookies.txt
            echo "Cookies written."
          else
            echo "No YOUTUBE_COOKIES secret — yt-dlp runs without cookies."
          fi
        continue-on-error: true

      - name: Run pipeline
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          # Without this every reel ships the hardcoded slogan fallback
          # ("Truth is found alone in the dark") — fetch_slogan() can only
          # call Groq when the key is in the env (2026-06-10 fix).
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_COOKIES_FILE: ${{ github.workspace }}/cookies.txt
          # Ship the kinetic v2 letterbox reels with the deep "elder sage"
          # narration (tts.py PITCH_SEMITONES -4.5, ~82 Hz). Remove this line
          # to fall back to the 7s fast-cut capcut style.
          STYLE: kinetic
        run: python pipeline.py --single

      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json runs/latest.json runs/history.jsonl
          git diff --cached --quiet || git commit -m "chore: update state + run metrics [skip ci]"
          git push

      - name: Save updated Instagram session
        if: always()
        run: |
          SESSION_FILE="${{ secrets.INSTAGRAM_USERNAME }}.session"
          if [ -f "$SESSION_FILE" ]; then
            echo "SESSION_B64=$(base64 -w 0 "$SESSION_FILE")" >> $GITHUB_OUTPUT
          fi
        id: save-session
